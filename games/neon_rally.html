<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON RALLY — Arcade Volley</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap');
  :root{
    --bg-deep:#0a0d1a; --bg-panel:#11162c;
    --cyan:#4cf3ff; --magenta:#ff4cdb; --amber:#ffd23f; --green:#7dffc4; --red:#ff5c6c;
    --text:#dce6ff; --muted:#7d89b0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0;
    background:radial-gradient(ellipse at 50% -10%, #1b2350 0%, var(--bg-deep) 55%, #05060c 100%);
    color:var(--text); font-family:'Space Mono', monospace;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:18px;
  }
  .arcade-wrap{ width:100%; max-width:720px; margin:0 auto; }
  .hud-bar{
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(180deg, var(--bg-panel), #0c1024);
    border:2px solid #2a3360; border-radius:10px 10px 0 0; padding:10px 16px;
    box-shadow:0 0 24px rgba(76,243,255,0.08) inset;
  }
  .hud-group{display:flex; align-items:center; gap:22px; flex-wrap:wrap;}
  .hud-label{font-size:9px; color:var(--muted); letter-spacing:1px; margin-bottom:3px; text-align:center;}
  .hud-value{font-family:'Press Start 2P', monospace; font-size:18px; text-align:center;}
  .hud-value.left{ color:var(--cyan); text-shadow:0 0 8px rgba(76,243,255,0.6); }
  .hud-value.right{ color:var(--magenta); text-shadow:0 0 8px rgba(255,76,219,0.6); }
  #mute-btn{ background:none; border:2px solid #2a3360; color:var(--text); border-radius:6px; font-size:16px; width:34px; height:34px; cursor:pointer; line-height:1; }
  #mute-btn:hover{border-color:var(--cyan);}
  .stage{ position:relative; width:100%; border:2px solid #2a3360; border-top:none; border-radius:0 0 10px 10px; overflow:hidden;
    box-shadow:0 18px 50px -10px rgba(0,0,0,0.6), 0 0 30px rgba(76,243,255,0.05) inset; }
  canvas{ display:block; width:100%; height:auto; aspect-ratio:7/5; background:#04050a; }
  .stage::after{ content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 2px, transparent 4px);
    pointer-events:none; mix-blend-mode:overlay; }
  #overlay{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(6,8,18,0); opacity:0; pointer-events:none; transition:opacity 0.2s ease; }
  #overlay.visible{ background:rgba(6,8,18,0.72); opacity:1; pointer-events:auto; }
  #overlay-box{ text-align:center; padding:26px 30px; max-width:88%; border:2px solid var(--cyan); border-radius:12px;
    background:linear-gradient(180deg, rgba(17,22,44,0.95), rgba(10,13,28,0.95));
    box-shadow:0 0 40px rgba(76,243,255,0.2), 0 0 80px rgba(255,76,219,0.08); }
  #overlay-box h1{ font-family:'Press Start 2P', monospace; font-size:19px; margin:0 0 14px; color:var(--amber);
    text-shadow:2px 2px 0 rgba(255,76,219,0.5), -2px -2px 0 rgba(76,243,255,0.3); letter-spacing:1px; }
  #overlay-box .sub{ color:var(--text); font-size:12px; margin:0 0 16px; line-height:1.6; }
  #overlay-box .rules{ color:var(--muted); font-size:10px; line-height:1.8; margin-bottom:16px; text-align:left; display:inline-block; }
  #overlay-box .rules b{ color:var(--text); }
  .btnrow{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .arcade-btn{ font-family:'Space Mono', monospace; font-weight:700; font-size:12px; letter-spacing:2px;
    background:transparent; border:2px solid var(--cyan); color:var(--cyan); padding:11px 20px; border-radius:8px; cursor:pointer;
    text-shadow:0 0 6px rgba(76,243,255,0.5); box-shadow:0 0 16px rgba(76,243,255,0.15); transition:all 0.15s ease; }
  .arcade-btn:hover{ background:var(--cyan); color:#06101a; box-shadow:0 0 26px rgba(76,243,255,0.55); }
  .footnote{ text-align:center; color:var(--muted); font-size:9px; margin-top:10px; letter-spacing:0.5px; }
  @media (max-width:480px){ #overlay-box h1{font-size:14px;} #overlay-box .rules{font-size:9px;} .hud-value{font-size:14px;} }
</style>
</head>
<body>

<div class="arcade-wrap">
  <div class="hud-bar">
    <div class="hud-group">
      <div><div class="hud-label" id="left-label">YOU</div><div class="hud-value left" id="left-score">0</div></div>
      <div><div class="hud-label">FIRST TO 11</div><div class="hud-value" style="color:var(--muted);font-size:12px;">VS</div></div>
      <div><div class="hud-label" id="right-label">CPU</div><div class="hud-value right" id="right-score">0</div></div>
    </div>
    <button id="mute-btn" title="Mute (M)">&#128266;</button>
  </div>

  <div class="stage" id="stage">
    <canvas id="game" width="700" height="500"></canvas>
    <div id="overlay"><div id="overlay-box"></div></div>
  </div>

  <div class="footnote">P1: W/S &nbsp;•&nbsp; P2 (2P mode): ARROWS &nbsp;•&nbsp; SPACE — SERVE/START &nbsp;•&nbsp; P — PAUSE &nbsp;•&nbsp; M — MUTE</div>
</div>

<script>
(function(){
  "use strict";

  const CANVAS_W = 700, CANVAS_H = 500;
  const PADDLE_W = 12, PADDLE_H = 90, PADDLE_MARGIN = 24;
  const PADDLE_SPEED = 6.2;
  const BALL_SIZE = 12;
  const BALL_BASE_SPEED = 4.4, BALL_MAX_SPEED = 9.2, BALL_SPEED_GROWTH = 1.045;
  const WIN_SCORE = 11;

  const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayBox = document.getElementById('overlay-box');
  const leftScoreEl = document.getElementById('left-score');
  const rightScoreEl = document.getElementById('right-score');
  const leftLabelEl = document.getElementById('left-label');
  const rightLabelEl = document.getElementById('right-label');
  const muteBtn = document.getElementById('mute-btn');

  let audioCtx = null, audioEnabled = true;
  function ensureAudio(){
    if (!audioCtx){
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ audioEnabled = false; return; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, dur, type, vol){
    if (!audioEnabled || !audioCtx) return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = type || 'square'; osc.frequency.value = freq; gain.gain.value = vol != null ? vol : 0.05;
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    osc.start(now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    osc.stop(now+dur+0.02);
  }
  function playSound(name){
    if (!audioEnabled) return;
    switch(name){
      case 'paddle': beep(420, 0.05, 'square', 0.045); break;
      case 'wall': beep(280, 0.04, 'square', 0.035); break;
      case 'score': beep(660, 0.12, 'sine', 0.06); setTimeout(()=>beep(880,0.12,'sine',0.05),90); break;
      case 'matchwin':
        beep(523,0.12,'sine',0.06); setTimeout(()=>beep(659,0.12,'sine',0.06),100);
        setTimeout(()=>beep(784,0.12,'sine',0.06),200); setTimeout(()=>beep(1046,0.22,'sine',0.07),300);
        break;
    }
  }
  muteBtn.addEventListener('click', () => {
    audioEnabled = !audioEnabled;
    muteBtn.innerHTML = audioEnabled ? '&#128266;' : '&#128263;';
  });

  let state = 'start'; // start, serve, playing, paused, matchOver
  let mode = '1p'; // '1p' or '2p'
  let leftScore = 0, rightScore = 0;
  let leftPaddle, rightPaddle, ball;
  let particles = [];
  let serveTimer = 0;
  let aiTarget = CANVAS_H/2, aiRetimer = 0;
  let keys = {};

  function setState(s){ state = s; updateOverlay(); }

  function makePaddles(){
    leftPaddle = { y: CANVAS_H/2-PADDLE_H/2 };
    rightPaddle = { y: CANVAS_H/2-PADDLE_H/2 };
  }

  function serveBall(towardLeft){
    const angle = (Math.random()*0.6-0.3); // radians, small vertical component
    const dir = towardLeft ? -1 : 1;
    ball = {
      x: CANVAS_W/2, y: CANVAS_H/2,
      vx: Math.cos(angle)*BALL_BASE_SPEED*dir,
      vy: Math.sin(angle)*BALL_BASE_SPEED
    };
  }

  function startMatch(selectedMode){
    mode = selectedMode;
    leftScore = 0; rightScore = 0;
    leftLabelEl.textContent = 'YOU';
    rightLabelEl.textContent = mode === '2p' ? 'P2' : 'CPU';
    updateScoreHUD();
    makePaddles();
    particles = [];
    serveBall(Math.random()<0.5);
    serveTimer = 900;
    setState('serve');
  }

  function updateScoreHUD(){
    leftScoreEl.textContent = leftScore;
    rightScoreEl.textContent = rightScore;
  }

  function handlePrimaryAction(){
    ensureAudio();
    if (state === 'start') startMatch(mode);
    else if (state === 'matchOver') setState('start');
    else if (state === 'paused') setState('playing');
  }
  function togglePause(){
    if (state === 'playing') setState('paused');
    else if (state === 'paused') setState('playing');
  }

  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space'){ e.preventDefault(); handlePrimaryAction(); }
    if (e.code === 'KeyP'){ togglePause(); }
    if (e.code === 'KeyM'){ audioEnabled = !audioEnabled; muteBtn.innerHTML = audioEnabled ? '&#128266;' : '&#128263;'; }
  });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) handlePrimaryAction(); });

  function updateOverlay(){
    if (state === 'start'){
      overlay.classList.add('visible');
      overlayBox.innerHTML =
        '<h1>NEON RALLY</h1>' +
        '<p class="sub">Arcade Volley</p>' +
        '<div class="rules"><b>P1:</b> W / S<br><b>P2 (2P mode):</b> Arrow Up / Down<br>' +
        '<b>Space</b> — serve &nbsp;•&nbsp; <b>P</b> — pause &nbsp;•&nbsp; <b>M</b> — mute</div>' +
        '<div class="btnrow"><button class="arcade-btn" data-mode="1p">1 PLAYER</button>' +
        '<button class="arcade-btn" data-mode="2p">2 PLAYER</button></div>';
      overlayBox.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => { ensureAudio(); startMatch(btn.getAttribute('data-mode')); });
      });
    } else if (state === 'paused'){
      overlay.classList.add('visible');
      overlayBox.innerHTML = '<h1>PAUSED</h1><button class="arcade-btn">RESUME</button>';
      overlayBox.querySelector('button').addEventListener('click', handlePrimaryAction);
    } else if (state === 'matchOver'){
      overlay.classList.add('visible');
      const winner = leftScore > rightScore ? leftLabelEl.textContent : rightLabelEl.textContent;
      overlayBox.innerHTML =
        '<h1>' + winner + ' WINS!</h1>' +
        '<p class="sub">' + leftScore + ' — ' + rightScore + '</p>' +
        '<button class="arcade-btn">PLAY AGAIN</button>';
      overlayBox.querySelector('button').addEventListener('click', handlePrimaryAction);
    } else {
      overlay.classList.remove('visible');
      overlayBox.innerHTML = '';
    }
  }

  function moveLeftPaddle(dtFrames){
    if (keys['KeyW']) leftPaddle.y -= PADDLE_SPEED*dtFrames;
    if (keys['KeyS']) leftPaddle.y += PADDLE_SPEED*dtFrames;
    leftPaddle.y = clamp(leftPaddle.y, 0, CANVAS_H-PADDLE_H);
  }

  function moveRightPaddle(dtFrames, msDelta){
    if (mode === '2p'){
      if (keys['ArrowUp']) rightPaddle.y -= PADDLE_SPEED*dtFrames;
      if (keys['ArrowDown']) rightPaddle.y += PADDLE_SPEED*dtFrames;
    } else {
      aiRetimer -= msDelta;
      if (aiRetimer <= 0){
        aiRetimer = 180 + Math.random()*120;
        aiTarget = ball.y + (Math.random()*60-30);
      }
      const center = rightPaddle.y + PADDLE_H/2;
      const diff = aiTarget - center;
      const aiSpeed = PADDLE_SPEED*0.8;
      if (Math.abs(diff) > 4){
        rightPaddle.y += Math.sign(diff)*Math.min(aiSpeed*dtFrames, Math.abs(diff));
      }
    }
    rightPaddle.y = clamp(rightPaddle.y, 0, CANVAS_H-PADDLE_H);
  }

  function spawnParticles(x,y,color,count){
    if (particles.length > 200) return;
    for (let i=0;i<count;i++){
      particles.push({ x,y, vx:(Math.random()-0.5)*4.2, vy:(Math.random()-0.5)*4.2, life:1, color, size:Math.random()*3+1.6 });
    }
  }
  function updateFX(dtFrames){
    for (let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx*dtFrames; p.y += p.vy*dtFrames; p.life -= 0.05*dtFrames;
      if (p.life <= 0) particles.splice(i,1);
    }
  }

  function updateBall(dtFrames){
    ball.x += ball.vx*dtFrames;
    ball.y += ball.vy*dtFrames;

    if (ball.y-BALL_SIZE/2 < 0){ ball.y = BALL_SIZE/2; ball.vy = Math.abs(ball.vy); playSound('wall'); spawnParticles(ball.x,ball.y,'#4cf3ff',4); }
    if (ball.y+BALL_SIZE/2 > CANVAS_H){ ball.y = CANVAS_H-BALL_SIZE/2; ball.vy = -Math.abs(ball.vy); playSound('wall'); spawnParticles(ball.x,ball.y,'#4cf3ff',4); }

    const lx = PADDLE_MARGIN, lw = PADDLE_W;
    if (ball.vx < 0 && ball.x-BALL_SIZE/2 <= lx+lw && ball.x-BALL_SIZE/2 >= lx-6 &&
        ball.y+BALL_SIZE/2 > leftPaddle.y && ball.y-BALL_SIZE/2 < leftPaddle.y+PADDLE_H){
      const rel = clamp((ball.y-(leftPaddle.y+PADDLE_H/2))/(PADDLE_H/2), -1, 1);
      const speed = Math.min(Math.hypot(ball.vx,ball.vy)*BALL_SPEED_GROWTH, BALL_MAX_SPEED);
      const angle = rel*0.9;
      ball.vx = Math.cos(angle)*speed;
      ball.vy = Math.sin(angle)*speed;
      ball.x = lx+lw+BALL_SIZE/2+0.5;
      playSound('paddle');
      spawnParticles(ball.x,ball.y,'#4cf3ff',6);
    }

    const rx = CANVAS_W-PADDLE_MARGIN-PADDLE_W;
    if (ball.vx > 0 && ball.x+BALL_SIZE/2 >= rx && ball.x+BALL_SIZE/2 <= rx+lw+6 &&
        ball.y+BALL_SIZE/2 > rightPaddle.y && ball.y-BALL_SIZE/2 < rightPaddle.y+PADDLE_H){
      const rel = clamp((ball.y-(rightPaddle.y+PADDLE_H/2))/(PADDLE_H/2), -1, 1);
      const speed = Math.min(Math.hypot(ball.vx,ball.vy)*BALL_SPEED_GROWTH, BALL_MAX_SPEED);
      const angle = Math.PI - rel*0.9;
      ball.vx = Math.cos(angle)*speed;
      ball.vy = Math.sin(angle)*speed;
      ball.x = rx-BALL_SIZE/2-0.5;
      playSound('paddle');
      spawnParticles(ball.x,ball.y,'#ff4cdb',6);
    }

    if (ball.x < -30){
      rightScore++;
      updateScoreHUD();
      playSound('score');
      if (rightScore >= WIN_SCORE){ setState('matchOver'); playSound('matchwin'); }
      else { serveBall(true); serveTimer = 900; setState('serve'); }
    } else if (ball.x > CANVAS_W+30){
      leftScore++;
      updateScoreHUD();
      playSound('score');
      if (leftScore >= WIN_SCORE){ setState('matchOver'); playSound('matchwin'); }
      else { serveBall(false); serveTimer = 900; setState('serve'); }
    }
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function render(now){
    const grad = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H*0.3, 40, CANVAS_W/2, CANVAS_H*0.5, CANVAS_H*0.9);
    grad.addColorStop(0, '#0e1330'); grad.addColorStop(1, '#04050c');
    ctx.fillStyle = grad; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

    ctx.strokeStyle = 'rgba(124,160,255,0.25)';
    ctx.lineWidth = 3;
    ctx.setLineDash([10,12]);
    ctx.beginPath();
    ctx.moveTo(CANVAS_W/2, 0);
    ctx.lineTo(CANVAS_W/2, CANVAS_H);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.save();
    ctx.shadowColor = '#4cf3ff'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#4cf3ff';
    roundRect(PADDLE_MARGIN, leftPaddle.y, PADDLE_W, PADDLE_H, 4); ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.shadowColor = '#ff4cdb'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ff4cdb';
    roundRect(CANVAS_W-PADDLE_MARGIN-PADDLE_W, rightPaddle.y, PADDLE_W, PADDLE_H, 4); ctx.fill();
    ctx.restore();

    if (ball && (state === 'playing' || state === 'serve')){
      ctx.save();
      ctx.shadowColor = '#fff'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#fff';
      roundRect(ball.x-BALL_SIZE/2, ball.y-BALL_SIZE/2, BALL_SIZE, BALL_SIZE, 2); ctx.fill();
      ctx.restore();
    }

    particles.forEach(p => {
      ctx.globalAlpha = Math.max(p.life,0);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    if (state === 'serve'){
      ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
      ctx.fillStyle = '#dce6ff'; ctx.shadowColor = '#4cf3ff'; ctx.shadowBlur = 8;
      ctx.fillText('SERVING...', CANVAS_W/2, CANVAS_H/2-30);
      ctx.shadowBlur = 0;
    }
    if (state === 'paused'){
      ctx.fillStyle = 'rgba(4,5,12,0.4)';
      ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    }
  }

  let lastTime = performance.now();
  function loop(now){
    const msDelta = Math.min(now-lastTime, 42);
    const dtFrames = msDelta/16.6667;
    lastTime = now;

    if (state === 'serve'){
      moveLeftPaddle(dtFrames);
      moveRightPaddle(dtFrames, msDelta);
      serveTimer -= msDelta;
      if (serveTimer <= 0) setState('playing');
    } else if (state === 'playing'){
      moveLeftPaddle(dtFrames);
      moveRightPaddle(dtFrames, msDelta);
      updateBall(dtFrames);
      updateFX(dtFrames);
    }

    render(now);
    requestAnimationFrame(loop);
  }

  function init(){
    makePaddles();
    serveBall(true);
    state = 'start';
    updateOverlay();
    updateScoreHUD();
    requestAnimationFrame(loop);
  }

  init();
})();
</script>
</body>
</html>
