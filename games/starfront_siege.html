<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARFRONT SIEGE — Neon Arcade Defense</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --bg-deep:#0a0d1a;
    --bg-panel:#11162c;
    --cyan:#4cf3ff;
    --magenta:#ff4cdb;
    --amber:#ffd23f;
    --green:#59ff8d;
    --red:#ff5c6c;
    --text:#dce6ff;
    --muted:#7d89b0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0;
    background:radial-gradient(ellipse at 50% -10%, #1b2350 0%, var(--bg-deep) 55%, #05060c 100%);
    color:var(--text); font-family:'Space Mono', monospace;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:18px;
  }
  .arcade-wrap{ width:100%; max-width:560px; margin:0 auto; }
  .hud-bar{
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(180deg, var(--bg-panel), #0c1024);
    border:2px solid #2a3360; border-radius:10px 10px 0 0; padding:10px 16px;
    box-shadow:0 0 24px rgba(89,255,141,0.08) inset;
  }
  .hud-group{display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
  .hud-label{font-size:9px; color:var(--muted); letter-spacing:1px; margin-bottom:3px;}
  .hud-value{font-family:'Press Start 2P', monospace; font-size:13px; color:var(--green); text-shadow:0 0 8px rgba(89,255,141,0.6);}
  #lives-icons{ display:flex; gap:4px; }
  .life-icon{ width:14px; height:10px; background:var(--amber); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
  #mute-btn{ background:none; border:2px solid #2a3360; color:var(--text); border-radius:6px; font-size:16px; width:34px; height:34px; cursor:pointer; line-height:1; }
  #mute-btn:hover{border-color:var(--green);}
  .stage{ position:relative; width:100%; border:2px solid #2a3360; border-top:none; border-radius:0 0 10px 10px; overflow:hidden;
    box-shadow:0 18px 50px -10px rgba(0,0,0,0.6), 0 0 30px rgba(89,255,141,0.05) inset; }
  canvas{ display:block; width:100%; height:auto; aspect-ratio:640/720; background:#05060c; }
  .stage::after{ content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 2px, transparent 4px);
    pointer-events:none; mix-blend-mode:overlay; }
  #overlay{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(6,8,18,0); opacity:0; pointer-events:none; transition:opacity 0.2s ease; }
  #overlay.visible{ background:rgba(6,8,18,0.72); opacity:1; pointer-events:auto; }
  #overlay-box{ text-align:center; padding:28px 32px; max-width:86%; border:2px solid var(--green); border-radius:12px;
    background:linear-gradient(180deg, rgba(17,22,44,0.95), rgba(10,13,28,0.95));
    box-shadow:0 0 40px rgba(89,255,141,0.2), 0 0 80px rgba(255,76,219,0.08); }
  #overlay-box h1{ font-family:'Press Start 2P', monospace; font-size:19px; margin:0 0 14px; color:var(--amber);
    text-shadow:2px 2px 0 rgba(255,76,219,0.5), -2px -2px 0 rgba(76,243,255,0.3); letter-spacing:1px; }
  #overlay-box .sub{ color:var(--text); font-size:12px; margin:0 0 16px; line-height:1.6; }
  #overlay-box .rules{ color:var(--muted); font-size:10px; line-height:1.9; margin-bottom:18px; text-align:left; display:inline-block; }
  #overlay-box .rules b{ color:var(--text); }
  .arcade-btn{ font-family:'Space Mono', monospace; font-weight:700; font-size:12px; letter-spacing:2px;
    background:transparent; border:2px solid var(--green); color:var(--green); padding:11px 24px; border-radius:8px; cursor:pointer;
    text-shadow:0 0 6px rgba(89,255,141,0.5); box-shadow:0 0 16px rgba(89,255,141,0.15); transition:all 0.15s ease; }
  .arcade-btn:hover{ background:var(--green); color:#06140a; box-shadow:0 0 26px rgba(89,255,141,0.55); }
  .footnote{ text-align:center; color:var(--muted); font-size:9px; margin-top:10px; letter-spacing:0.5px; }
  .ctrlrow{ display:flex; justify-content:center; gap:10px; margin-top:14px; }
  .ctrlrow button{ background:rgba(17,22,44,0.9); border:2px solid #2a3360; border-radius:8px; color:var(--green);
    font-size:14px; width:64px; height:44px; cursor:pointer; user-select:none; font-family:'Space Mono',monospace; font-weight:700; }
  .ctrlrow button:active{ background:var(--green); color:#06140a; }
  @media (max-width:480px){ #overlay-box h1{font-size:14px;} #overlay-box .rules{font-size:9px;} .hud-value{font-size:11px;} }
</style>
</head>
<body>

<div class="arcade-wrap">
  <div class="hud-bar">
    <div class="hud-group">
      <div><div class="hud-label">SCORE</div><div class="hud-value" id="score-val">0</div></div>
      <div><div class="hud-label">WAVE</div><div class="hud-value" id="wave-val">1</div></div>
      <div><div class="hud-label">LIVES</div><div id="lives-icons"></div></div>
    </div>
    <button id="mute-btn" title="Mute (M)">&#128266;</button>
  </div>

  <div class="stage" id="stage">
    <canvas id="game" width="640" height="720"></canvas>
    <div id="overlay"><div id="overlay-box"></div></div>
  </div>

  <div class="footnote">ARROWS / A D — MOVE &nbsp;•&nbsp; SPACE — FIRE / START &nbsp;•&nbsp; P — PAUSE</div>

  <div class="ctrlrow">
    <button id="btn-left">&#9664;</button>
    <button id="btn-fire">FIRE</button>
    <button id="btn-right">&#9654;</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ============================================================
  // CONFIG
  // ============================================================
  const CANVAS_W = 640, CANVAS_H = 720;
  const PIXEL = 4;

  // Original pixel-grid sprites (own design, two animation frames per alien tier)
  const SPRITES = {
    tierA_f1: ["...XX...","..XXXX..",".XXXXXX.","XX.XX.XX","XXXXXXXX","..X..X..",".X....X.","X.X..X.X"],
    tierA_f2: ["...XX...","..XXXX..",".XXXXXX.","XX.XX.XX","XXXXXXXX","..X..X..","X..XX..X",".X....X."],
    tierB_f1: ["..X.....X..","...X...X...","..XXXXXXX..",".XX.XXX.XX.","XXXXXXXXXXX","X.XXXXXXX.X","X.X.....X.X","...XX.XX..."],
    tierB_f2: ["..X.....X..","...X...X...","..XXXXXXX..",".XX.XXX.XX.","XXXXXXXXXXX","X.XXXXXXX.X","..X.....X..",".X.X...X.X."],
    tierC_f1: ["....XXXX....",".XXXXXXXXXX.","XXXXXXXXXXXX","XXX..XX..XXX","XXXXXXXXXXXX","...XX..XX...","..XX.XX.XX..",".XX..XX..XX."],
    tierC_f2: ["....XXXX....",".XXXXXXXXXX.","XXXXXXXXXXXX","XXX..XX..XXX","XXXXXXXXXXXX","..XX....XX..",".XX..XX..XX.","XX....XX...."],
    player:   [".....XX.....","....XXXX....","....XXXX....","..XXXXXXXX..",".XXXXXXXXXX.","XXXXXXXXXXXX","XXX.XXXX.XXX","XX...XX...XX"],
    ufo:      ["......XX......","....XXXXXX....","..XXXXXXXXXX..","XXXXXXXXXXXXXX",".XX.XX.XX.XX..","..X..X..X..X.."]
  };
  const TIER_COLOR = { A:'#ff8ad1', B:'#5be9ff', C:'#7dffa0' };
  const TIER_POINTS = { A:30, B:20, C:10 };
  const ROW_TIER = ['A','B','B','C','C'];

  const BUNKER_GRID = ["XXXXXXXX","XXXXXXXX","XXXXXXXX","XXXXXXXX","XXX..XXX","XX....XX"];
  const BUNKER_BLOCK = 6;

  const ALIEN_COLS = 10, ALIEN_ROWS = 5;
  const SPACING_X = 54, SPACING_Y = 44;
  const START_X = 50, START_Y = 100;

  const PLAYER_W = 13*PIXEL, PLAYER_H = 8*PIXEL;
  const PLAYER_Y = 656;

  const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));

  // ============================================================
  // DOM
  // ============================================================
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayBox = document.getElementById('overlay-box');
  const scoreEl = document.getElementById('score-val');
  const waveEl = document.getElementById('wave-val');
  const livesIconsEl = document.getElementById('lives-icons');
  const muteBtn = document.getElementById('mute-btn');

  // ============================================================
  // AUDIO
  // ============================================================
  let audioCtx = null, audioEnabled = true;
  function ensureAudio(){
    if (!audioCtx){
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ audioEnabled = false; return; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, dur, type, vol){
    if (!audioEnabled || !audioCtx) return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = type || 'square'; osc.frequency.value = freq; gain.gain.value = vol != null ? vol : 0.05;
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    osc.start(now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    osc.stop(now+dur+0.02);
  }
  function playSound(name){
    if (!audioEnabled) return;
    switch(name){
      case 'shoot': beep(880, 0.07, 'square', 0.04); break;
      case 'alienShoot': beep(180, 0.08, 'sawtooth', 0.035); break;
      case 'explode': beep(120, 0.16, 'sawtooth', 0.06); break;
      case 'playerHit': beep(140, 0.3, 'sawtooth', 0.07); break;
      case 'ufo': beep(500, 0.1, 'sine', 0.04); break;
      case 'ufoHit': beep(900,0.1,'sine',0.06); setTimeout(()=>beep(1200,0.1,'sine',0.05),70); break;
      case 'march1': beep(90, 0.05, 'square', 0.03); break;
      case 'march2': beep(70, 0.05, 'square', 0.03); break;
      case 'waveClear':
        beep(523,0.12,'sine',0.06); setTimeout(()=>beep(659,0.12,'sine',0.06),100);
        setTimeout(()=>beep(784,0.12,'sine',0.06),200); setTimeout(()=>beep(1046,0.2,'sine',0.07),300);
        break;
      case 'gameover': beep(180,0.4,'sawtooth',0.06); break;
      case 'extralife': beep(660,0.1,'sine',0.06); setTimeout(()=>beep(880,0.15,'sine',0.06),100); break;
    }
  }
  muteBtn.addEventListener('click', () => {
    audioEnabled = !audioEnabled;
    muteBtn.innerHTML = audioEnabled ? '&#128266;' : '&#128263;';
  });

  // ============================================================
  // STATE
  // ============================================================
  let state = 'start'; // start, ready, playing, paused, waveClear, gameOver
  let score = 0, wave = 1, lives = 3, extraLifeAwarded = false;
  let player, aliens, playerBullets, alienBullets, bunkers, ufo;
  let formation, particles, floatingTexts;
  let readyTimer = 0, marchToggle = 0;
  let keys = {};
  let stars = [];
  for (let i=0;i<60;i++) stars.push({x:Math.random()*CANVAS_W, y:Math.random()*CANVAS_H, r:Math.random()*1.3+0.4, phase:Math.random()*Math.PI*2});

  function setState(s){ state = s; updateOverlay(); updateHUD(); }

  function updateHUD(){
    scoreEl.textContent = score;
    waveEl.textContent = wave;
    livesIconsEl.innerHTML = '';
    for (let i=0;i<Math.max(lives,0);i++){
      const d = document.createElement('div'); d.className='life-icon'; livesIconsEl.appendChild(d);
    }
  }

  function tierWidthPx(tier){ return SPRITES['tier'+tier+'_f1'][0].length * PIXEL; }
  function tierHeightPx(){ return 8*PIXEL; }

  function buildAliens(){
    const list = [];
    for (let r=0;r<ALIEN_ROWS;r++){
      const tier = ROW_TIER[r];
      for (let c=0;c<ALIEN_COLS;c++){
        list.push({ col:c, row:r, tier, alive:true });
      }
    }
    return list;
  }

  function buildBunkers(){
    const list = [];
    const xs = [60, 220, 380, 540];
    xs.forEach(bx => {
      const grid = BUNKER_GRID.map(row => row.split('').map(ch => ch === 'X'));
      list.push({ x:bx, y:560, grid });
    });
    return list;
  }

  function aliveCount(){ return aliens.filter(a=>a.alive).length; }
  function totalCount(){ return ALIEN_COLS*ALIEN_ROWS; }

  function stepInterval(){
    const ratio = aliveCount()/totalCount();
    const base = Math.max(380 - (wave-1)*18, 140);
    return Math.max(70, base*ratio + 65);
  }

  function alienPos(a){
    const baseX = START_X + a.col*SPACING_X;
    const baseY = START_Y + a.row*SPACING_Y;
    const w = tierWidthPx(a.tier);
    return { x: baseX + formation.offsetX + (SPACING_X-w)/2, y: baseY + formation.offsetY, w, h: tierHeightPx() };
  }

  function setupWave(){
    aliens = buildAliens();
    bunkers = buildBunkers();
    playerBullets = []; alienBullets = [];
    ufo = { active:false, x:0, y:30, dir:1, speed:1.6, nextSpawn: 8000+Math.random()*8000 };
    formation = { offsetX:0, offsetY:0, dir:1, timer: 600, frame:0 };
    particles = []; floatingTexts = [];
  }

  function setupPlayer(){
    player = { x: CANVAS_W/2-PLAYER_W/2, y: PLAYER_Y, cooldown:0 };
  }

  function startGame(){
    score = 0; wave = 1; lives = 3; extraLifeAwarded = false;
    setupWave(); setupPlayer();
    setState('ready'); readyTimer = 1300;
  }
  function restartGame(){ startGame(); }

  function nextWave(){
    wave++;
    setupWave();
    player.cooldown = 0;
    setState('ready'); readyTimer = 1300;
  }

  function loseLife(){
    lives--;
    updateHUD();
    playSound('playerHit');
    spawnParticles(player.x+PLAYER_W/2, player.y+PLAYER_H/2, '#ffd23f', 14);
    if (lives <= 0){
      setState('gameOver');
      playSound('gameover');
    } else {
      playerBullets = []; alienBullets = [];
      player.x = CANVAS_W/2-PLAYER_W/2;
      setState('ready'); readyTimer = 1000;
    }
  }

  // ============================================================
  // INPUT
  // ============================================================
  function handlePrimaryAction(){
    ensureAudio();
    if (state === 'start') startGame();
    else if (state === 'gameOver') restartGame();
    else if (state === 'paused') setState('playing');
    else if (state === 'playing') firePlayerBullet();
  }
  function togglePause(){
    if (state === 'playing') setState('paused');
    else if (state === 'paused') setState('playing');
  }

  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space'){ e.preventDefault(); handlePrimaryAction(); }
    if (e.code === 'KeyP'){ togglePause(); }
    if (e.code === 'KeyM'){ audioEnabled = !audioEnabled; muteBtn.innerHTML = audioEnabled ? '&#128266;' : '&#128263;'; }
  });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; });

  let leftHeld=false, rightHeld=false;
  document.getElementById('btn-left').addEventListener('touchstart', e=>{e.preventDefault();leftHeld=true;},{passive:false});
  document.getElementById('btn-left').addEventListener('touchend', e=>{e.preventDefault();leftHeld=false;},{passive:false});
  document.getElementById('btn-left').addEventListener('mousedown', ()=>leftHeld=true);
  document.getElementById('btn-left').addEventListener('mouseup', ()=>leftHeld=false);
  document.getElementById('btn-left').addEventListener('mouseleave', ()=>leftHeld=false);
  document.getElementById('btn-right').addEventListener('touchstart', e=>{e.preventDefault();rightHeld=true;},{passive:false});
  document.getElementById('btn-right').addEventListener('touchend', e=>{e.preventDefault();rightHeld=false;},{passive:false});
  document.getElementById('btn-right').addEventListener('mousedown', ()=>rightHeld=true);
  document.getElementById('btn-right').addEventListener('mouseup', ()=>rightHeld=false);
  document.getElementById('btn-right').addEventListener('mouseleave', ()=>rightHeld=false);
  document.getElementById('btn-fire').addEventListener('click', ()=> handlePrimaryAction());
  document.getElementById('btn-fire').addEventListener('touchstart', e=>{e.preventDefault(); handlePrimaryAction();},{passive:false});

  overlay.addEventListener('click', (e) => { if (e.target === overlay) handlePrimaryAction(); });

  // ============================================================
  // OVERLAY
  // ============================================================
  function updateOverlay(){
    if (state === 'start'){
      overlay.classList.add('visible');
      overlayBox.innerHTML =
        '<h1>STARFRONT SIEGE</h1>' +
        '<p class="sub">Neon Arcade Defense</p>' +
        '<div class="rules">' +
          '<b>Arrows / A D</b> — move<br>' +
          '<b>Space</b> — fire / start<br>' +
          '<b>P</b> — pause &nbsp;•&nbsp; <b>M</b> — mute<br><br>' +
          'Hold the line. Waves get faster forever.' +
        '</div>' +
        '<button class="arcade-btn">START GAME</button>';
    } else if (state === 'paused'){
      overlay.classList.add('visible');
      overlayBox.innerHTML = '<h1>PAUSED</h1><button class="arcade-btn">RESUME</button>';
    } else if (state === 'gameOver'){
      overlay.classList.add('visible');
      overlayBox.innerHTML =
        '<h1>GAME OVER</h1>' +
        '<p class="sub">Final Score: ' + score + ' &mdash; reached Wave ' + wave + '</p>' +
        '<button class="arcade-btn">TRY AGAIN</button>';
    } else {
      overlay.classList.remove('visible');
      overlayBox.innerHTML = '';
      return;
    }
    const btn = overlayBox.querySelector('button');
    if (btn) btn.addEventListener('click', handlePrimaryAction);
  }

  // ============================================================
  // GAMEPLAY
  // ============================================================
  function firePlayerBullet(){
    if (player.cooldown > 0) return;
    if (playerBullets.length >= 2) return;
    playerBullets.push({ x: player.x+PLAYER_W/2-2, y: player.y-6, w:4, h:12 });
    player.cooldown = 260;
    playSound('shoot');
  }

  function movePlayer(dtFrames){
    const speed = 4.4*dtFrames;
    if (keys['ArrowLeft'] || keys['KeyA'] || leftHeld) player.x -= speed;
    if (keys['ArrowRight'] || keys['KeyD'] || rightHeld) player.x += speed;
    player.x = clamp(player.x, 10, CANVAS_W-10-PLAYER_W);
    if (player.cooldown > 0) player.cooldown -= dtFrames*16.6667;
  }

  function updateFormation(dtFrames, msDelta){
    formation.timer -= msDelta;
    if (formation.timer <= 0){
      formation.timer = stepInterval();
      formation.frame = 1-formation.frame;
      marchToggle = 1-marchToggle;
      playSound(marchToggle ? 'march1' : 'march2');

      let minX = Infinity, maxX = -Infinity;
      aliens.forEach(a => { if (!a.alive) return; const p = alienPos(a); minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x+p.w); });
      if (minX === Infinity) return;

      const willMinX = minX + formation.dir*16;
      const willMaxX = maxX + formation.dir*16;
      if (willMaxX > CANVAS_W-12 || willMinX < 12){
        formation.dir *= -1;
        formation.offsetY += 16;
      } else {
        formation.offsetX += formation.dir*16;
      }
    }
  }

  function maybeAlienShoot(msDelta){
    if (alienBullets.length >= 3) return;
    const chance = (0.00045 + wave*0.00004) * msDelta;
    if (Math.random() > chance) return;
    const cols = {};
    aliens.forEach(a => { if (a.alive){ if (!cols[a.col] || a.row > cols[a.col].row) cols[a.col] = a; } });
    const list = Object.values(cols);
    if (!list.length) return;
    const shooter = list[Math.floor(Math.random()*list.length)];
    const p = alienPos(shooter);
    alienBullets.push({ x:p.x+p.w/2-2, y:p.y+p.h, w:4, h:12 });
    playSound('alienShoot');
  }

  function updateUfo(dtFrames, msDelta){
    if (!ufo.active){
      ufo.nextSpawn -= msDelta;
      if (ufo.nextSpawn <= 0){
        ufo.active = true;
        ufo.dir = Math.random()<0.5 ? 1 : -1;
        ufo.x = ufo.dir>0 ? -40 : CANVAS_W+40;
        ufo.y = 36;
        playSound('ufo');
      }
      return;
    }
    ufo.x += ufo.dir*ufo.speed*dtFrames;
    if (ufo.x > CANVAS_W+50 || ufo.x < -50){
      ufo.active = false;
      ufo.nextSpawn = 10000+Math.random()*10000;
    }
  }

  function rectsOverlap(a,b){
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  function bunkerHit(bullet){
    for (const bnk of bunkers){
      for (let gy=0; gy<bnk.grid.length; gy++){
        for (let gx=0; gx<bnk.grid[gy].length; gx++){
          if (!bnk.grid[gy][gx]) continue;
          const bx = bnk.x+gx*BUNKER_BLOCK, by = bnk.y+gy*BUNKER_BLOCK;
          if (rectsOverlap(bullet, {x:bx,y:by,w:BUNKER_BLOCK,h:BUNKER_BLOCK})){
            bnk.grid[gy][gx] = false;
            spawnParticles(bx+BUNKER_BLOCK/2, by+BUNKER_BLOCK/2, '#7dffa0', 3);
            return true;
          }
        }
      }
    }
    return false;
  }

  function updateBullets(dtFrames){
    for (let i=playerBullets.length-1;i>=0;i--){
      const b = playerBullets[i];
      b.y -= 8.6*dtFrames;
      let removed = false;
      if (b.y+b.h < 0){ playerBullets.splice(i,1); continue; }
      if (bunkerHit(b)){ playerBullets.splice(i,1); continue; }
      if (ufo.active && rectsOverlap(b, {x:ufo.x-28,y:ufo.y-12,w:56,h:24})){
        const bonus = [50,100,150,200,300][Math.floor(Math.random()*5)];
        score += bonus;
        spawnFloatingText(ufo.x, ufo.y, '+'+bonus, '#ff8ad1');
        spawnParticles(ufo.x, ufo.y, '#ff8ad1', 14);
        playSound('ufoHit');
        ufo.active = false; ufo.nextSpawn = 10000+Math.random()*10000;
        playerBullets.splice(i,1); updateHUD(); checkExtraLife();
        continue;
      }
      for (const a of aliens){
        if (!a.alive) continue;
        const p = alienPos(a);
        if (rectsOverlap(b, p)){
          a.alive = false;
          score += TIER_POINTS[a.tier];
          spawnParticles(p.x+p.w/2, p.y+p.h/2, TIER_COLOR[a.tier], 10);
          playSound('explode');
          playerBullets.splice(i,1); removed = true;
          updateHUD(); checkExtraLife();
          break;
        }
      }
      if (removed) continue;
    }

    for (let i=alienBullets.length-1;i>=0;i--){
      const b = alienBullets[i];
      b.y += 5.4*dtFrames;
      if (b.y > CANVAS_H){ alienBullets.splice(i,1); continue; }
      if (bunkerHit(b)){ alienBullets.splice(i,1); continue; }
      if (rectsOverlap(b, {x:player.x,y:player.y,w:PLAYER_W,h:PLAYER_H})){
        alienBullets.splice(i,1);
        loseLife();
        return;
      }
    }
  }

  function checkExtraLife(){
    if (!extraLifeAwarded && score >= 10000){
      extraLifeAwarded = true;
      lives = Math.min(lives+1, 9);
      spawnFloatingText(CANVAS_W/2, PLAYER_Y-20, 'EXTRA LIFE', '#59ff8d');
      playSound('extralife');
      updateHUD();
    }
  }

  function checkAliensReachedBottom(){
    for (const a of aliens){
      if (!a.alive) continue;
      const p = alienPos(a);
      if (p.y+p.h >= player.y){
        setState('gameOver');
        playSound('gameover');
        return true;
      }
    }
    return false;
  }

  function checkWaveClear(){
    if (aliveCount() === 0){
      score += 50*wave;
      playSound('waveClear');
      nextWave();
    }
  }

  function spawnParticles(x,y,color,count){
    if (particles.length > 240) return;
    for (let i=0;i<count;i++){
      particles.push({ x,y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4-0.4, life:1, color, size:Math.random()*3+1.6 });
    }
  }
  function spawnFloatingText(x,y,text,color){ floatingTexts.push({x,y,text,color,life:1}); }

  function updateFX(dtFrames){
    for (let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx*dtFrames; p.y += p.vy*dtFrames; p.vy += 0.05*dtFrames; p.life -= 0.045*dtFrames;
      if (p.life <= 0) particles.splice(i,1);
    }
    for (let i=floatingTexts.length-1;i>=0;i--){
      const f = floatingTexts[i];
      f.y -= 0.5*dtFrames; f.life -= 0.016*dtFrames;
      if (f.life <= 0) floatingTexts.splice(i,1);
    }
  }

  // ============================================================
  // RENDER
  // ============================================================
  function drawPixelSprite(grid, x, y, color){
    ctx.fillStyle = color;
    for (let r=0;r<grid.length;r++){
      const row = grid[r];
      for (let c=0;c<row.length;c++){
        if (row[c] === 'X') ctx.fillRect(x+c*PIXEL, y+r*PIXEL, PIXEL, PIXEL);
      }
    }
  }

  function drawBackground(now){
    const grad = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H*0.15, 40, CANVAS_W/2, CANVAS_H*0.5, CANVAS_H*0.9);
    grad.addColorStop(0, '#0e1330'); grad.addColorStop(1, '#04050c');
    ctx.fillStyle = grad; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    stars.forEach(s => {
      const a = 0.25+0.35*Math.sin(now*0.0016+s.phase);
      ctx.globalAlpha = Math.max(a,0.05);
      ctx.fillStyle = '#cfe0ff';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawAliens(){
    aliens.forEach(a => {
      if (!a.alive) return;
      const p = alienPos(a);
      const frameKey = 'tier'+a.tier+'_f'+(formation.frame===0?1:2);
      ctx.save();
      ctx.shadowColor = TIER_COLOR[a.tier]; ctx.shadowBlur = 5;
      drawPixelSprite(SPRITES[frameKey], p.x, p.y, TIER_COLOR[a.tier]);
      ctx.restore();
    });
  }

  function drawBunkers(){
    bunkers.forEach(bnk => {
      ctx.fillStyle = '#5ddf86';
      for (let gy=0; gy<bnk.grid.length; gy++){
        for (let gx=0; gx<bnk.grid[gy].length; gx++){
          if (bnk.grid[gy][gx]){
            ctx.fillRect(bnk.x+gx*BUNKER_BLOCK, bnk.y+gy*BUNKER_BLOCK, BUNKER_BLOCK-1, BUNKER_BLOCK-1);
          }
        }
      }
    });
  }

  function drawPlayer(){
    ctx.save();
    ctx.shadowColor = '#ffd23f'; ctx.shadowBlur = 8;
    drawPixelSprite(SPRITES.player, player.x, player.y, '#ffd23f');
    ctx.restore();
  }

  function drawUfo(){
    if (!ufo.active) return;
    ctx.save();
    ctx.shadowColor = '#ff8ad1'; ctx.shadowBlur = 8;
    drawPixelSprite(SPRITES.ufo, ufo.x-28, ufo.y-12, '#ff8ad1');
    ctx.restore();
  }

  function drawBullets(){
    ctx.fillStyle = '#bfffe0';
    ctx.shadowColor = '#bfffe0'; ctx.shadowBlur = 6;
    playerBullets.forEach(b => ctx.fillRect(b.x,b.y,b.w,b.h));
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ff7d8a';
    ctx.shadowColor = '#ff7d8a'; ctx.shadowBlur = 6;
    alienBullets.forEach(b => ctx.fillRect(b.x,b.y,b.w,b.h));
    ctx.shadowBlur = 0;
  }

  function render(now){
    drawBackground(now);
    drawBunkers();
    drawAliens();
    drawUfo();
    drawBullets();
    if (state !== 'gameOver') drawPlayer();

    particles.forEach(p => {
      ctx.globalAlpha = Math.max(p.life,0);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    floatingTexts.forEach(f => {
      ctx.globalAlpha = Math.max(f.life,0);
      ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
      ctx.fillStyle = f.color; ctx.shadowColor = f.color; ctx.shadowBlur = 6;
      ctx.fillText(f.text, f.x, f.y);
    });
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;

    if (state === 'ready'){
      ctx.font = 'bold 16px "Press Start 2P", monospace';
      ctx.textAlign = 'center'; ctx.fillStyle = '#ffd23f';
      ctx.shadowColor = '#ffd23f'; ctx.shadowBlur = 8;
      ctx.fillText('WAVE ' + wave, CANVAS_W/2, CANVAS_H/2-20);
      ctx.font = 'bold 12px "Press Start 2P", monospace';
      ctx.fillText('READY!', CANVAS_W/2, CANVAS_H/2+14);
      ctx.shadowBlur = 0;
    }
    if (state === 'paused'){
      ctx.fillStyle = 'rgba(4,5,12,0.4)';
      ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    }
  }

  // ============================================================
  // MAIN LOOP
  // ============================================================
  let lastTime = performance.now();

  function loop(now){
    const msDelta = Math.min(now-lastTime, 42);
    const dtFrames = msDelta/16.6667;
    lastTime = now;

    if (state === 'ready'){
      readyTimer -= msDelta;
      if (readyTimer <= 0) setState('playing');
    } else if (state === 'playing'){
      movePlayer(dtFrames);
      updateFormation(dtFrames, msDelta);
      maybeAlienShoot(msDelta);
      updateUfo(dtFrames, msDelta);
      updateBullets(dtFrames);
      updateFX(dtFrames);
      if (state === 'playing'){
        if (!checkAliensReachedBottom()) checkWaveClear();
      }
    }

    render(now);
    requestAnimationFrame(loop);
  }

  // ============================================================
  // INIT
  // ============================================================
  function init(){
    setupWave(); setupPlayer();
    state = 'start';
    updateOverlay(); updateHUD();
    requestAnimationFrame(loop);
  }

  init();
})();
</script>
