<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON COIL — Grid Crawler</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap');
  :root{
    --bg-deep:#0a0d1a; --bg-panel:#11162c;
    --cyan:#4cf3ff; --magenta:#ff4cdb; --amber:#ffd23f; --green:#7dffc4; --red:#ff5c6c;
    --text:#dce6ff; --muted:#7d89b0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0;
    background:radial-gradient(ellipse at 50% -10%, #1b2350 0%, var(--bg-deep) 55%, #05060c 100%);
    color:var(--text); font-family:'Space Mono', monospace;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:18px;
  }
  .arcade-wrap{ width:100%; max-width:520px; margin:0 auto; }
  .hud-bar{
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(180deg, var(--bg-panel), #0c1024);
    border:2px solid #2a3360; border-radius:10px 10px 0 0; padding:10px 16px;
    box-shadow:0 0 24px rgba(124,255,196,0.08) inset;
  }
  .hud-group{display:flex; align-items:center; gap:18px; flex-wrap:wrap;}
  .hud-label{font-size:9px; color:var(--muted); letter-spacing:1px; margin-bottom:3px;}
  .hud-value{font-family:'Press Start 2P', monospace; font-size:13px; color:var(--green); text-shadow:0 0 8px rgba(124,255,196,0.6);}
  #mute-btn{ background:none; border:2px solid #2a3360; color:var(--text); border-radius:6px; font-size:16px; width:34px; height:34px; cursor:pointer; line-height:1; }
  #mute-btn:hover{border-color:var(--green);}
  .stage{ position:relative; width:100%; border:2px solid #2a3360; border-top:none; border-radius:0 0 10px 10px; overflow:hidden;
    box-shadow:0 18px 50px -10px rgba(0,0,0,0.6), 0 0 30px rgba(124,255,196,0.05) inset; }
  canvas{ display:block; width:100%; height:auto; aspect-ratio:1/1; background:#04050a; }
  .stage::after{ content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 2px, transparent 4px);
    pointer-events:none; mix-blend-mode:overlay; }
  #overlay{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(6,8,18,0); opacity:0; pointer-events:none; transition:opacity 0.2s ease; }
  #overlay.visible{ background:rgba(6,8,18,0.72); opacity:1; pointer-events:auto; }
  #overlay-box{ text-align:center; padding:26px 30px; max-width:88%; border:2px solid var(--green); border-radius:12px;
    background:linear-gradient(180deg, rgba(17,22,44,0.95), rgba(10,13,28,0.95));
    box-shadow:0 0 40px rgba(124,255,196,0.2), 0 0 80px rgba(255,76,219,0.08); }
  #overlay-box h1{ font-family:'Press Start 2P', monospace; font-size:18px; margin:0 0 14px; color:var(--amber);
    text-shadow:2px 2px 0 rgba(255,76,219,0.5), -2px -2px 0 rgba(76,243,255,0.3); letter-spacing:1px; }
  #overlay-box .sub{ color:var(--text); font-size:12px; margin:0 0 16px; line-height:1.6; }
  #overlay-box .rules{ color:var(--muted); font-size:10px; line-height:1.8; margin-bottom:16px; text-align:left; display:inline-block; }
  #overlay-box .rules b{ color:var(--text); }
  .arcade-btn{ font-family:'Space Mono', monospace; font-weight:700; font-size:12px; letter-spacing:2px;
    background:transparent; border:2px solid var(--green); color:var(--green); padding:11px 24px; border-radius:8px; cursor:pointer;
    text-shadow:0 0 6px rgba(124,255,196,0.5); box-shadow:0 0 16px rgba(124,255,196,0.15); transition:all 0.15s ease; }
  .arcade-btn:hover{ background:var(--green); color:#06140a; box-shadow:0 0 26px rgba(124,255,196,0.55); }
  .footnote{ text-align:center; color:var(--muted); font-size:9px; margin-top:10px; letter-spacing:0.5px; }
  .dpad{ display:flex; flex-direction:row; gap:6px; justify-content:center; margin:10px auto 0; width:fit-content; }
  .dpad button{ width:44px; height:44px; background:rgba(17,22,44,0.9); border:2px solid #2a3360; border-radius:8px;
    color:var(--green); font-size:16px; cursor:pointer; user-select:none; }
  .dpad button:active{ background:var(--green); color:#06140a; }
  @media (max-width:480px){ #overlay-box h1{font-size:14px;} #overlay-box .rules{font-size:9px;} .hud-value{font-size:11px;} }
</style>
</head>
<body>

<div class="arcade-wrap">
  <div class="hud-bar">
    <div class="hud-group">
      <div><div class="hud-label">SCORE</div><div class="hud-value" id="score-val">0</div></div>
      <div><div class="hud-label">SPEED</div><div class="hud-value" id="level-val">1</div></div>
      <div><div class="hud-label">LENGTH</div><div class="hud-value" id="length-val">4</div></div>
    </div>
    <button id="mute-btn" title="Mute (M)">&#128266;</button>
  </div>

  <div class="stage" id="stage">
    <canvas id="game" width="500" height="500"></canvas>
    <div id="overlay"><div id="overlay-box"></div></div>
  </div>

  <div class="footnote">ARROW KEYS / WASD — STEER &nbsp;•&nbsp; SPACE — START/RESTART &nbsp;•&nbsp; P — PAUSE &nbsp;•&nbsp; M — MUTE</div>

  <div class="dpad">
    <button data-dx="-1" data-dy="0">&#9664;</button>
    <button data-dx="0" data-dy="-1">&#9650;</button>
    <button data-dx="0" data-dy="1">&#9660;</button>
    <button data-dx="1" data-dy="0">&#9654;</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  const COLS = 25, ROWS = 25, CELL = 20;
  const CANVAS_W = COLS*CELL, CANVAS_H = ROWS*CELL;
  const START_LEN = 4;
  const BASE_INTERVAL = 150, MIN_INTERVAL = 70, INTERVAL_STEP = 4;

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayBox = document.getElementById('overlay-box');
  const scoreEl = document.getElementById('score-val');
  const levelEl = document.getElementById('level-val');
  const lengthEl = document.getElementById('length-val');
  const muteBtn = document.getElementById('mute-btn');

  let audioCtx = null, audioEnabled = true;
  function ensureAudio(){
    if (!audioCtx){
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ audioEnabled = false; return; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, dur, type, vol){
    if (!audioEnabled || !audioCtx) return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = type || 'square'; osc.frequency.value = freq; gain.gain.value = vol != null ? vol : 0.05;
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    osc.start(now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    osc.stop(now+dur+0.02);
  }
  function playSound(name){
    if (!audioEnabled) return;
    switch(name){
      case 'eat': beep(520, 0.05, 'square', 0.04); break;
      case 'bonus': beep(740, 0.1, 'sine', 0.06); setTimeout(()=>beep(980,0.08,'sine',0.05),60); break;
      case 'die': beep(160,0.4,'sawtooth',0.07); break;
      case 'levelup': beep(523,0.1,'sine',0.06); setTimeout(()=>beep(659,0.12,'sine',0.06),90); break;
    }
  }
  muteBtn.addEventListener('click', () => {
    audioEnabled = !audioEnabled;
    muteBtn.innerHTML = audioEnabled ? '&#128266;' : '&#128263;';
  });

  let state = 'start'; // start, playing, paused, gameOver
  let snake, dir, nextDir, food, bonus, score, speedLevel, moveTimer, moveInterval, particles, eatenCount;
  let keys = {};

  function setState(s){ state = s; updateOverlay(); }

  function updateHUD(){
    scoreEl.textContent = score;
    levelEl.textContent = speedLevel;
    lengthEl.textContent = snake.length;
  }

  function randomEmptyCell(){
    let col, row, collision;
    do {
      col = Math.floor(Math.random()*COLS);
      row = Math.floor(Math.random()*ROWS);
      collision = snake.some(s => s.col===col && s.row===row);
    } while (collision);
    return { col, row };
  }

  function startGame(){
    const midCol = Math.floor(COLS/2), midRow = Math.floor(ROWS/2);
    snake = [];
    for (let i=0;i<START_LEN;i++) snake.push({ col: midCol-i, row: midRow });
    dir = { dx:1, dy:0 };
    nextDir = { dx:1, dy:0 };
    score = 0; speedLevel = 1; eatenCount = 0;
    moveInterval = BASE_INTERVAL;
    moveTimer = moveInterval;
    particles = [];
    bonus = null;
    food = randomEmptyCell();
    updateHUD();
    setState('playing');
  }

  function handlePrimaryAction(){
    ensureAudio();
    if (state === 'start') startGame();
    else if (state === 'gameOver') startGame();
    else if (state === 'paused') setState('playing');
  }
  function togglePause(){
    if (state === 'playing') setState('paused');
    else if (state === 'paused') setState('playing');
  }

  function setDesiredDir(dx,dy){
    if (state === 'start' || state === 'gameOver'){ handlePrimaryAction(); return; }
    if (dir.dx === -dx && dir.dy === -dy) return; // ignore instant reversal
    nextDir = { dx, dy };
  }

  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space'){ e.preventDefault(); handlePrimaryAction(); }
    if (e.code === 'KeyP'){ togglePause(); }
    if (e.code === 'KeyM'){ audioEnabled = !audioEnabled; muteBtn.innerHTML = audioEnabled ? '&#128266;' : '&#128263;'; }
    if (e.code === 'ArrowUp' || e.code === 'KeyW'){ setDesiredDir(0,-1); }
    if (e.code === 'ArrowDown' || e.code === 'KeyS'){ setDesiredDir(0,1); }
    if (e.code === 'ArrowLeft' || e.code === 'KeyA'){ setDesiredDir(-1,0); }
    if (e.code === 'ArrowRight' || e.code === 'KeyD'){ setDesiredDir(1,0); }
  });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; });

  document.querySelectorAll('.dpad button').forEach(btn => {
    const dx = parseInt(btn.getAttribute('data-dx'),10);
    const dy = parseInt(btn.getAttribute('data-dy'),10);
    btn.addEventListener('click', (e) => { e.preventDefault(); ensureAudio(); setDesiredDir(dx,dy); });
  });

  overlay.addEventListener('click', (e) => { if (e.target === overlay) handlePrimaryAction(); });

  function updateOverlay(){
    if (state === 'start'){
      overlay.classList.add('visible');
      overlayBox.innerHTML =
        '<h1>NEON COIL</h1>' +
        '<p class="sub">Grid Crawler</p>' +
        '<div class="rules"><b>Arrows / WASD / D-pad</b> — steer<br>' +
        '<b>Space</b> — start &nbsp;•&nbsp; <b>P</b> — pause &nbsp;•&nbsp; <b>M</b> — mute<br><br>' +
        'Eat to grow. Avoid the walls and your own tail.</div>' +
        '<button class="arcade-btn">START GAME</button>';
      overlayBox.querySelector('button').addEventListener('click', handlePrimaryAction);
    } else if (state === 'paused'){
      overlay.classList.add('visible');
      overlayBox.innerHTML = '<h1>PAUSED</h1><button class="arcade-btn">RESUME</button>';
      overlayBox.querySelector('button').addEventListener('click', handlePrimaryAction);
    } else if (state === 'gameOver'){
      overlay.classList.add('visible');
      overlayBox.innerHTML =
        '<h1>GAME OVER</h1>' +
        '<p class="sub">Score: ' + score + ' &mdash; Length: ' + snake.length + '</p>' +
        '<button class="arcade-btn">TRY AGAIN</button>';
      overlayBox.querySelector('button').addEventListener('click', handlePrimaryAction);
    } else {
      overlay.classList.remove('visible');
      overlayBox.innerHTML = '';
    }
  }

  function spawnParticles(col,row,color,count){
    if (particles.length > 200) return;
    const x = col*CELL+CELL/2, y = row*CELL+CELL/2;
    for (let i=0;i<count;i++){
      particles.push({ x,y, vx:(Math.random()-0.5)*3.6, vy:(Math.random()-0.5)*3.6, life:1, color, size:Math.random()*2.6+1.4 });
    }
  }
  function updateFX(dtFrames){
    for (let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx*dtFrames; p.y += p.vy*dtFrames; p.life -= 0.045*dtFrames;
      if (p.life <= 0) particles.splice(i,1);
    }
  }

  function stepSnake(){
    dir = nextDir;
    const head = snake[0];
    const newHead = { col: head.col+dir.dx, row: head.row+dir.dy };

    if (newHead.col < 0 || newHead.col >= COLS || newHead.row < 0 || newHead.row >= ROWS){
      gameOver(); return;
    }
    const hitsSelf = snake.some((s,idx) => idx < snake.length && s.col===newHead.col && s.row===newHead.row);
    if (hitsSelf){ gameOver(); return; }

    snake.unshift(newHead);

    let grew = false;
    if (food && newHead.col===food.col && newHead.row===food.row){
      score += 10;
      eatenCount++;
      spawnParticles(food.col, food.row, '#ffe9c2', 8);
      playSound('eat');
      grew = true;
      food = randomEmptyCell();
      if (eatenCount % 5 === 0 && !bonus){
        bonus = { ...randomEmptyCell(), timer: 6000 };
      }
      const newLevel = 1+Math.floor(eatenCount/5);
      if (newLevel !== speedLevel){
        speedLevel = newLevel;
        moveInterval = Math.max(MIN_INTERVAL, BASE_INTERVAL - (speedLevel-1)*INTERVAL_STEP);
        playSound('levelup');
      }
    } else if (bonus && newHead.col===bonus.col && newHead.row===bonus.row){
      score += 50;
      spawnParticles(bonus.col, bonus.row, '#ffd23f', 12);
      playSound('bonus');
      grew = true;
      bonus = null;
    }

    if (!grew) snake.pop();
    updateHUD();
  }

  function gameOver(){
    spawnParticles(snake[0].col, snake[0].row, '#ff5c6c', 16);
    playSound('die');
    setState('gameOver');
  }

  function updateBonus(msDelta){
    if (!bonus) return;
    bonus.timer -= msDelta;
    if (bonus.timer <= 0) bonus = null;
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function render(now){
    const grad = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H*0.3, 30, CANVAS_W/2, CANVAS_H*0.5, CANVAS_H*0.9);
    grad.addColorStop(0, '#0e1330'); grad.addColorStop(1, '#04050c');
    ctx.fillStyle = grad; ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

    if (food){
      const pulse = 0.6+0.4*Math.sin(now*0.006);
      ctx.save();
      ctx.shadowColor = '#ffe9c2'; ctx.shadowBlur = 8*pulse;
      ctx.fillStyle = '#ffe9c2';
      ctx.beginPath();
      ctx.arc(food.col*CELL+CELL/2, food.row*CELL+CELL/2, CELL*0.3, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    if (bonus){
      const flashing = bonus.timer < 1500 && Math.floor(now/150)%2===0;
      ctx.save();
      ctx.shadowColor = '#ffd23f'; ctx.shadowBlur = 10;
      ctx.fillStyle = flashing ? '#fff7d6' : '#ffd23f';
      const cx = bonus.col*CELL+CELL/2, cy = bonus.row*CELL+CELL/2, r = CELL*0.38;
      ctx.beginPath();
      ctx.moveTo(cx, cy-r); ctx.lineTo(cx+r, cy); ctx.lineTo(cx, cy+r); ctx.lineTo(cx-r, cy);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    snake.forEach((s, idx) => {
      const t = idx/Math.max(snake.length-1,1);
      const lightness = 65 - t*30;
      const color = idx===0 ? '#7dffe0' : `hsl(180,80%,${lightness}%)`;
      ctx.save();
      ctx.shadowColor = color; ctx.shadowBlur = idx===0 ? 8 : 4;
      ctx.fillStyle = color;
      roundRect(s.col*CELL+1.5, s.row*CELL+1.5, CELL-3, CELL-3, 5);
      ctx.fill();
      ctx.restore();
      if (idx===0){
        ctx.fillStyle = '#06140a';
        const ex = s.col*CELL+CELL/2 + dir.dx*4, ey = s.row*CELL+CELL/2 + dir.dy*4;
        const perpx = -dir.dy*4, perpy = dir.dx*4;
        ctx.beginPath(); ctx.arc(ex+perpx*0.5, ey+perpy*0.5, 1.8, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex-perpx*0.5, ey-perpy*0.5, 1.8, 0, Math.PI*2); ctx.fill();
      }
    });

    particles.forEach(p => {
      ctx.globalAlpha = Math.max(p.life,0);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    if (state === 'paused'){
      ctx.fillStyle = 'rgba(4,5,12,0.4)';
      ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
    }
  }

  let lastTime = performance.now();
  function loop(now){
    const msDelta = Math.min(now-lastTime, 42);
    const dtFrames = msDelta/16.6667;
    lastTime = now;

    if (state === 'playing'){
      moveTimer -= msDelta;
      updateBonus(msDelta);
      updateFX(dtFrames);
      if (moveTimer <= 0){
        moveTimer += moveInterval;
        stepSnake();
      }
    } else {
      updateFX(dtFrames);
    }

    render(now);
    requestAnimationFrame(loop);
  }

  function init(){
    snake = [{col:12,row:12},{col:11,row:12},{col:10,row:12},{col:9,row:12}];
    dir = {dx:1,dy:0}; nextDir = {dx:1,dy:0};
    food = {col:18,row:12}; bonus = null; particles = [];
    score = 0; speedLevel = 1;
    state = 'start';
    updateOverlay();
    updateHUD();
    requestAnimationFrame(loop);
  }

  init();
})();
</script>
</body>
</html>
